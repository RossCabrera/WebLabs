<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% block meta_description %}A curated collection of books{% endblock %}">
  
  <title>{% block title %}BookStore{% endblock %} | BookStore</title>
  
  {% load static %}
  <link rel="stylesheet" href="{% static 'base.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="page-wrapper">
    <!-- Navigation Header -->
    <header class="header">
      <nav class="navbar">
        <div class="nav-container">
          <a href="/" class="logo">
            <span class="logo-icon">📚</span>
            <span class="logo-text">BookStore</span>
          </a>
          <ul class="nav-links">
            <li><a href="/" class="nav-link active">All Books</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <p>&copy; 2024 BookStore. All rights reserved.</p>
      </div>
    </footer>
  </div>
</body>
</html>
