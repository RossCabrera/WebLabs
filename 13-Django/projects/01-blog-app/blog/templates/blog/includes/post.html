{% load static %}

<li>
  <article class="post">
    <a href="{% url "post-detail-page" post.slug %}">
      <img src="{% static "blog/images/"|add:post.image_name %}" alt="{{ post.title }}"
      />
      <div class="post__content">
        <h3>{{ post.title }}</h3>
        <p>
          {{ post.excerpt }}
        </p>

        {% if post.tags.all %}
        <div class="post__tags">
          {% for tag in post.tags.all %}
            <span class="tag">{{ tag.caption }}</span>
          {% endfor %}
        </div>
        {% endif %}
      </div>
    </a>
  </article>
</li>
