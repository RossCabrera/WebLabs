services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: bucket_user
      POSTGRES_PASSWORD: bucket_key!
      POSTGRES_DB: bucket_list_db
    ports:
      - "5434:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - bucket_list_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bucket_user -d bucket_list_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bucket_list_data:
